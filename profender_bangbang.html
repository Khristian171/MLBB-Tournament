<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profender Bangbang – MLBB Tournament 2026</title>
<style>
:root{
  --bg:#0b0f1a;
  --card:#141b2d;
  --accent:#00bfff;
  --text:#ffffff;
  --sub:#9ca3af;
  --reserve:#ff9f1c;
}
*{ margin:0; padding:0; box-sizing:border-box; font-family:Segoe UI,sans-serif; }
body{ background:var(--bg); color:var(--text); }

.hero{
  text-align:center;
  padding:50px 20px 35px;
  background:linear-gradient(135deg,#101827,#0b0f1a);
}
.hero .back{
  display:inline-flex; align-items:center; gap:6px;
  color:var(--accent); text-decoration:none; font-size:0.9rem;
  margin-bottom:18px;
}
.hero .back:hover{ opacity:.8; }
.hero .tourney{ color:var(--sub); font-size:0.9rem; margin-bottom:8px; }
.hero h1{ font-size:2.5rem; margin-bottom:6px; }
.hero .subtitle{ color:var(--sub); font-size:0.95rem; }

.container{ max-width:1100px; margin:auto; padding:40px 20px; }
.section-title{ margin-bottom:20px; font-size:1.5rem; }

.row-5{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:18px;
  margin-bottom:30px;
}

.reserve-label{
  color:var(--sub); font-size:0.85rem; letter-spacing:.08em;
  text-transform:uppercase; margin-bottom:12px;
}
.row-reserve{
  display:grid;
  grid-template-columns:repeat(1,220px);
  justify-content:center;
  gap:18px;
}

.player-card{
  background:var(--card);
  border-radius:15px;
  padding:20px 14px 18px;
  cursor:pointer;
  border:1px solid transparent;
  text-align:center;
  text-decoration:none;
  color:var(--text);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
  transition:transform .25s, border-color .25s;
}
.player-card:hover{
  transform:translateY(-5px);
  border-color:var(--accent);
}
.player-card.reserve{
  border-color:rgba(255,159,28,.35);
}
.player-card.reserve:hover{
  border-color:var(--reserve);
}

.player-photo{
  width:75px; height:75px;
  border-radius:50%;
  background:#1e2a40;
  display:flex; align-items:center; justify-content:center;
  font-size:1.6rem; font-weight:bold; color:var(--accent);
  overflow:hidden; flex-shrink:0;
}
.player-photo img{ width:100%; height:100%; object-fit:cover; }

.player-ign{ font-size:0.95rem; font-weight:bold; color:var(--accent); line-height:1.2; }
.player-name{ font-size:0.8rem; color:var(--sub); }

.role-img{
  width:32px; height:32px; object-fit:contain;
  filter:drop-shadow(0 0 4px rgba(0,191,255,.4));
}
.role-label{ font-size:0.75rem; color:var(--sub); }

.reserve-badge{
  font-size:0.7rem; font-weight:bold;
  color:var(--reserve);
  background:rgba(255,159,28,.12);
  border:1px solid rgba(255,159,28,.3);
  border-radius:20px;
  padding:2px 10px;
}

footer{ text-align:center; padding:30px; color:var(--sub); }

@media(max-width:750px){
  .row-5{ grid-template-columns:repeat(2,1fr); }
  .hero h1{ font-size:1.8rem; }
}
</style>
</head>
<body>

<section class="hero">
  <a class="back" href="index.html">&#8592; Back to Teams</a>
  <p class="tourney">MLBB Tournament 2026</p>
  <h1>Profender Bangbang</h1>
  <p class="subtitle">Official Roster</p>
</section>

<div class="container">

  <h2 class="section-title">Players</h2>

  <div class="row-5" id="mainRow"></div>

  <div id="reserveSection" style="display:none;">
    <p class="reserve-label">Reserve</p>
    <div class="row-reserve" id="reserveRow"></div>
  </div>

</div>

<footer>MLBB Tournament Database © 2026</footer>

<script>
/*
  HOW TO EDIT PLAYERS:
  - photo:   path to player image, e.g. "images/player1.jpg"  (leave "" for initials placeholder)
  - roleImg: path to role icon image, e.g. "icons/midlane.png" (leave "" to show text label)
  - reserve: set to true for reserve player, false for main roster
  - file:    the HTML page this card links to
*/
const players = [
  {
    ign:      "baliw04",
    name:     " ",
    photo:    "",
    role:     "Exp Lane",
    roleImg:  "",
    file:     "profender_bangbang_1.html",
    reserve:  false
  },
  {
    ign:      "✿|Avelinoツ",
    name:     "",
    photo:    "",
    role:     "Jungle",
    roleImg:  "",
    file:     "profender_bangbang_2.html",
    reserve:  false
  },
  {
    ign:      "dudz007",
    name:     " ",
    photo:    "",
    role:     "Mid Lane",
    roleImg:  "",
    file:     "profender_bangbang_3.html",
    reserve:  false
  },
  {
    ign:      "b@ngi$$20",
    name:     " ",
    photo:    "",
    role:     "Roam",
    roleImg:  "",
    file:     "profender_bangbang_4.html",
    reserve:  false
  },
  {
    ign:      "JaymArusssta",
    name:     " ",
    photo:    "",
    role:     "Gold Lane",
    roleImg:  "",
    file:     "profender_bangbang_5.html",
    reserve:  false
  },
  // ── Reserve player ──────────────────────────────────────────
  // Remove or comment out the block below if there is no reserve.
  {
    ign:      " ",
    name:     " ",
    photo:    "",
    role:     " ",
    roleImg:  "",
    file:     "profender_bangbang_6.html",
    reserve:  true
  },
];

function initials(ign){ return ign.slice(0,2).toUpperCase(); }

function makeCard(p){
  const a = document.createElement("a");
  a.className = "player-card" + (p.reserve ? " reserve" : "");
  a.href = p.file;

  const photoDiv = document.createElement("div");
  photoDiv.className = "player-photo";
  if(p.photo){
    const img = document.createElement("img");
    img.src = p.photo;
    img.alt = p.ign;
    photoDiv.appendChild(img);
  } else {
    photoDiv.textContent = initials(p.ign);
  }
  a.appendChild(photoDiv);

  const roleHTML = p.roleImg
    ? `<img class="role-img" src="${p.roleImg}" alt="${p.role}">`
    : `<div class="role-label">${p.role}</div>`;

  const reserveBadge = p.reserve
    ? `<span class="reserve-badge">Reserve</span>`
    : "";

  a.insertAdjacentHTML("beforeend", `
    <div class="player-ign">${p.ign}</div>
    <div class="player-name">${p.name}</div>
    ${roleHTML}
    ${reserveBadge}
  `);

  return a;
}

const main    = players.filter(p => !p.reserve);
const reserve = players.filter(p =>  p.reserve);

const mainRow = document.getElementById("mainRow");
main.forEach(p => mainRow.appendChild(makeCard(p)));

if(reserve.length > 0){
  document.getElementById("reserveSection").style.display = "block";
  const resRow = document.getElementById("reserveRow");
  reserve.forEach(p => resRow.appendChild(makeCard(p)));
}
</script>

</body>
</html>
