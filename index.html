<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLBB Tournament 2026</title>
<style>
:root{
  --bg:#0b0f1a;
  --card:#141b2d;
  --accent:#00bfff;
  --text:#ffffff;
  --sub:#9ca3af;
}
*{ margin:0; padding:0; box-sizing:border-box; font-family:Segoe UI,sans-serif; }
body{ background:var(--bg); color:var(--text); }

.hero{
  text-align:center;
  padding:60px 20px 40px;
  background:linear-gradient(135deg,#101827,#0b0f1a);
}
.hero h1{ font-size:3rem; margin-bottom:10px; }
.hero p{ color:var(--sub); }

.container{ max-width:1100px; margin:auto; padding:40px 20px; }

.search{ margin-bottom:30px; }
.search input{
  width:100%; padding:15px;
  border:none; border-radius:12px;
  background:var(--card); color:white; font-size:16px;
}
.search input:focus{ outline:2px solid var(--accent); }

.section-title{ margin-bottom:20px; font-size:1.8rem; }

.row{
  display:grid;
  grid-template-columns: repeat(4,1fr);
  gap:20px;
  margin-bottom:20px;
}
.row.last-row{
  grid-template-columns: repeat(2,1fr);
  max-width:560px;
  margin-left:auto;
  margin-right:auto;
}

.team-card{
  background:var(--card);
  border-radius:15px;
  padding:24px 16px;
  cursor:pointer;
  border:1px solid transparent;
  text-align:center;
  text-decoration:none;
  color:var(--text);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
  transition:transform .25s, border-color .25s;
}
.team-card:hover{
  transform:translateY(-5px);
  border-color:var(--accent);
}

.team-logo{
  width:70px; height:70px;
  border-radius:50%;
  object-fit:cover;
  background:#1e2a40;
  display:flex; align-items:center; justify-content:center;
  font-size:1.5rem; font-weight:bold; color:var(--accent);
  flex-shrink:0;
}
.team-logo img{ width:70px; height:70px; border-radius:50%; object-fit:cover; }

.team-name{ font-size:1rem; font-weight:bold; line-height:1.3; }

footer{ text-align:center; padding:30px; color:var(--sub); }

@media(max-width:700px){
  .row{ grid-template-columns:repeat(2,1fr); }
  .row.last-row{ grid-template-columns:repeat(2,1fr); max-width:100%; }
  .hero h1{ font-size:2rem; }
}
</style>
</head>
<body>

<section class="hero">
  <h1>MLBB Tournament 2026</h1>
  <p>Official Team &amp; Player Database</p>
</section>

<div class="container">
  <div class="search">
    <input type="text" id="searchInput" placeholder="Search team...">
  </div>

  <h2 class="section-title">Teams</h2>

  <div id="teamGrid"></div>
</div>

<footer>MLBB Tournament Database © 2026</footer>

<script>
const teams = [
  { name:"Airpro Legends",    file:"airpro_legends.html",    initials:"AL" },
  { name:"Apollo Titans",     file:"apollo_titans.html",     initials:"AT" },
  { name:"Arivo Stars",    file:"arivo_stars.html",    initials:"AS" },
  { name:"Buffalo Wild Wings",  file:"buffalo_wild_wings.html",  initials:"BWW" },
  { name:"Fusion Forged Pogi Master",   file:"fusion_forged_pm.html",   initials:"FF" },
  { name:"Hamer Troopers",  file:"hamer_troopers.html",  initials:"HT" },
  { name:"HHKY",    file:"hhky.html",    initials:"HKY" },
  { name:"Option X",    file:"option_x.html",    initials:"OX" },
  { name:"Pro-fender Gamers",    file:"pro_fender_games.html",    initials:"PFG" },
  { name:"Profender Bangbang",  file:"profender_bangbang.html",  img:"teams/profenderbangbang.png" },
  { name:"Ridemax Syndicate",     file:"ridemax_syndicate.html",     initials:"RS" },
  { name:"Venom Powerhouse",    file:"venom_powerhouse.html",    initials:"VP" },
  { name:"Wheel Legend",  file:"wheel_legend.html",  initials:"WL" },
  { name:"Work Wheels on the Bus",    file:"ww_ot_b.html",    initials:"WWB" },
];

function buildGrid(list){
  const grid = document.getElementById("teamGrid");
  grid.innerHTML = "";

  const rows = [];
  const full = Math.floor(list.length / 4);
  const rem  = list.length % 4;

  for(let r=0; r<full; r++){
    rows.push({ items: list.slice(r*4, r*4+4), last: false });
  }
  if(rem > 0){
    rows.push({ items: list.slice(full*4), last: true });
  }

  rows.forEach(row=>{
    const rowEl = document.createElement("div");
    rowEl.className = row.last ? "row last-row" : "row";

    row.items.forEach(team=>{
      const a = document.createElement("a");
      a.className = "team-card";
      a.href = team.file;
      a.innerHTML = `
        <div class="team-logo">${team.img ? `<img src="${team.img}" alt="${team.name}">` : team.initials}</div>
        <div class="team-name">${team.name}</div>
      `;
      rowEl.appendChild(a);
    });

    grid.appendChild(rowEl);
  });
}

buildGrid(teams);

document.getElementById("searchInput").addEventListener("keyup", function(){
  const q = this.value.toLowerCase();
  const filtered = teams.filter(t => t.name.toLowerCase().includes(q));
  buildGrid(filtered);
  if(filtered.length === 0){
    document.getElementById("teamGrid").innerHTML =
      `<p style="color:var(--sub);margin-top:10px;">No teams found.</p>`;
  }
});
</script>

</body>
</html>
